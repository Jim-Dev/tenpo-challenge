server:
  port: 8080

spring:
  application:
    name: challenge
  datasource:
    url: jdbc:postgresql://localhost:5435/tenpo_db_challenge
    username: tenpo_db_user
    password: tenpo_db_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health, metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html